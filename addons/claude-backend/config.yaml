# Home Assistant Add-on configuration
name: Amira
version: "4.6.55"
slug: claude-backend
description: >-
  Amira - AI-powered smart home assistant with Claude, ChatGPT, Gemini,
  NVIDIA NIM and GitHub Models (40+ AI models) + Telegram & WhatsApp
url: https://github.com/Bobsilvio/ha-claude
init: false
arch:
  - aarch64
  - amd64
startup: application
apparmor: false
boot: auto
ingress: true
ingress_port: 5010
ingress_entry: /
panel_icon: mdi:robot-excited-outline
panel_title: Amira
homeassistant_api: true
map:
  - config:rw
ports:
  5010/tcp: 5010
ports_description:
  5010/tcp: "Amira API & WhatsApp webhook (Twilio)"
environment:
  DEBUG_MODE: "False"
  API_PORT: "5010"
options:
  anthropic_api_key: ""
  openai_api_key: ""
  google_api_key: ""
  github_token: ""
  nvidia_api_key: ""
  groq_api_key: ""
  mistral_api_key: ""
  openrouter_api_key: ""
  deepseek_api_key: ""
  xai_api_key: ""
  minimax_api_key: ""
  aihubmix_api_key: ""
  siliconflow_api_key: ""
  volcengine_api_key: ""
  dashscope_api_key: ""
  moonshot_api_key: ""
  zhipu_api_key: ""
  perplexity_api_key: ""
  custom_api_key: ""
  custom_api_base: ""
  custom_model_name: ""
  ollama_base_url: "http://localhost:11434"
  ollama_api_key: ""
  colored_logs: true
  debug_mode: false
  log_level: normal
schema:
  anthropic_api_key: password?
  openai_api_key: password?
  google_api_key: password?
  github_token: password?
  nvidia_api_key: password?
  groq_api_key: password?
  mistral_api_key: password?
  openrouter_api_key: password?
  deepseek_api_key: password?
  xai_api_key: password?
  minimax_api_key: password?
  aihubmix_api_key: password?
  siliconflow_api_key: password?
  volcengine_api_key: password?
  dashscope_api_key: password?
  moonshot_api_key: password?
  zhipu_api_key: password?
  perplexity_api_key: password?
  custom_api_key: password?
  custom_api_base: str?
  custom_model_name: str?
  ollama_base_url: str?
  ollama_api_key: password?
  colored_logs: bool?
  debug_mode: bool?
  log_level: list(normal|verbose|debug)?
  api_port: port?

documentation: https://github.com/Bobsilvio/ha-claude
support: https://github.com/Bobsilvio/ha-claude/issues
maintainers:
  - Bobsilvio
